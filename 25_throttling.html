<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throttling</title>
    <style>
        *  {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 10px 12px;
            background-color: rgb(52, 185, 238);
            border-radius: 8px;
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(34, 173, 228);
        }
    </style>
</head>
<body>
    <button>Click Me</button>

    <script>
        const btn = document.querySelector('button')

        const expensive = () => {
            console.log("button clicked!")
        }

        const throttle = (fn, limit) => {
            let flag = true;
            return () => {
                if(flag) {
                    fn()
                    flag = false;
                    setTimeout(() => {
                       flag = true;
                    }, limit)
                }
            }
        }

        const betterExpensive = throttle(expensive, 500)

        btn.addEventListener('click', betterExpensive)
    </script>
</body>
</html>
